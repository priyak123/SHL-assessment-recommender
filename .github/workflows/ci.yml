name: CI - Build and Smoke Test

on:
  push:
  pull_request:

jobs:
  build-and-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Start backend (background)
        run: |
          nohup python -m uvicorn backend.main:app --host 127.0.0.1 --port 8000 &
          for i in {1..10}; do
            if curl -sSf http://127.0.0.1:8000/; then break; fi
            sleep 1
          done

      - name: Install and build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Smoke test backend endpoint
        run: curl -sSf http://127.0.0.1:8000/
